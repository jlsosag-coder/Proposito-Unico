<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#1a1714"/>
  <meta name="description" content="Cinco herramientas para descubrir tu propósito personal y llamado de vida."/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Mi Propósito"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png"/>
  <title>Descubre tu Propósito</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div class="app" id="app">
    <div class="header">
      <p class="header-eyebrow">Proceso de propósito</p>
      <h1 class="header-title">Descubre tu llamado personal</h1>
      <p class="header-sub">Cinco herramientas para encontrar quién eres<br>y para qué estás aquí.</p>
    </div>
    <div class="progress-wrap">
      <div class="progress-steps" id="progressDots"></div>
      <p class="progress-label" id="progressLabel">Herramienta 1 de 5</p>
    </div>
    <div id="stepsContainer"></div>
    <div class="nav" id="navBar">
      <button class="btn btn-back" id="btnBack" onclick="goBack()">Atrás</button>
      <button class="btn btn-next" id="btnNext" onclick="goNext()">Continuar</button>
    </div>
  </div>

  <!-- Install banner -->
  <div id="installBanner" class="install-banner hidden">
    <p class="install-text">📲 Instala esta app en tu dispositivo</p>
    <button class="install-btn" id="installBtn">Instalar</button>
    <button class="install-close" onclick="document.getElementById('installBanner').classList.add('hidden')">✕</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
